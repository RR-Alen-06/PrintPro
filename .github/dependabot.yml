# =============================================================================
# PrintPro – GitHub Dependabot Configuration
# Automatically opens PRs for outdated dependencies in both workspaces.
# =============================================================================

version: 2

updates:
  # --------------------------------------------------------------------------
  # Frontend – npm (Vite / React)
  # --------------------------------------------------------------------------
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: "chore(deps-frontend)"
    reviewers: []
    ignore:
      # Keep major versions stable unless explicitly upgraded
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-router-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]

  # --------------------------------------------------------------------------
  # Backend – npm (Express / Node.js)
  # --------------------------------------------------------------------------
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: "chore(deps-backend)"
    reviewers: []
    ignore:
      - dependency-name: "express"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pg"
        update-types: ["version-update:semver-major"]

  # --------------------------------------------------------------------------
  # Root workspace – npm
  # --------------------------------------------------------------------------
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - root
    commit-message:
      prefix: "chore(deps-root)"

  # --------------------------------------------------------------------------
  # GitHub Actions – keep action versions up to date
  # --------------------------------------------------------------------------
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci(deps)"
