# =============================================================================
# PrintPro – Vercel Production Deploy
# Fires on every push (merge) to `main` AFTER the CI gate passes.
# =============================================================================

name: Deploy · Production

on:
  push:
    branches: [main]

concurrency:
  group: vercel-production
  cancel-in-progress: false   # never cancel in-flight production deploys

env:
  NODE_VERSION: "22"
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ---------------------------------------------------------------------------
  # Gate: re-run CI before deploying to production
  # ---------------------------------------------------------------------------
  ci-gate:
    name: CI Gate (pre-deploy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci --prefer-offline
        working-directory: frontend

      - name: Frontend lint
        run: npm run lint
        working-directory: frontend

      - name: Install backend deps
        run: npm ci --prefer-offline
        working-directory: backend

      - name: Backend lint
        run: npm run lint
        working-directory: backend

  # ---------------------------------------------------------------------------
  # Production deploy to Vercel
  # ---------------------------------------------------------------------------
  deploy-production:
    name: Vercel Production
    runs-on: ubuntu-latest
    needs: [ci-gate]
    permissions:
      contents: write
    environment:
      name: production
      url: ${{ steps.deploy.outputs.production_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project (via Vercel)
        run: |
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          cat .vercel/output/config.json
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || vars.VITE_API_BASE_URL }}

      - name: Deploy to Vercel (production)
        id: deploy
        run: |
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --yes > deployment_url.txt
          URL=$(tail -n 1 deployment_url.txt | tr -d '\n\r')
          echo "production_url=$URL" >> $GITHUB_OUTPUT

      - name: Print deployment URL
        run: |
          echo "✅ Production deployed to: ${{ steps.deploy.outputs.production_url }}"

      # ---- Create a GitHub Release tag for every production deploy ----------
      - name: Create deployment tag
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.substring(0, 7);
            const now = new Date().toISOString().replace(/[:.]/g, '-').substring(0, 19);
            const tagName = `deploy-${now}-${sha}`;
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tagName}`,
              sha: context.sha,
            });
            console.log(`Tagged production deploy as ${tagName}`);
