# =============================================================================
# PrintPro – PR Quality Checks
# Validates: PR title format (Conventional Commits), branch naming,
# and auto-labels PRs by change type.
# =============================================================================

name: PR Checks

on:
  pull_request:
    branches: [main, develop]
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Validate PR title follows Conventional Commits spec
  # ---------------------------------------------------------------------------
  pr-title:
    name: PR Title · Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed types (extend as needed)
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            must start with a lowercase letter.

  # ---------------------------------------------------------------------------
  # 2. Validate branch naming convention
  #    Allowed: feat/*, fix/*, chore/*, docs/*, hotfix/*, release/*
  # ---------------------------------------------------------------------------
  branch-name:
    name: Branch Name · Convention
    runs-on: ubuntu-latest
    steps:
      - name: Check branch naming
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const allowed = /^(feat|fix|chore|docs|hotfix|release|refactor|perf|test|style|ci|build)\/.+$/;
            if (!allowed.test(branch)) {
              core.setFailed(
                `❌ Branch name "${branch}" does not follow the convention.\n` +
                `Expected: feat/*, fix/*, chore/*, docs/*, hotfix/*, release/*, etc.\n` +
                `Example: feat/group-billing-ui`
              );
            } else {
              console.log(`✅ Branch name "${branch}" is valid.`);
            }

  # ---------------------------------------------------------------------------
  # 3. Auto-label PRs by change type
  # ---------------------------------------------------------------------------
  auto-label:
    name: Auto Label
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Label PR
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true
