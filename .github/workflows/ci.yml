# =============================================================================
# PrintPro – Continuous Integration
# Runs on every push to main/develop and every Pull Request targeting main.
# Jobs: lint (backend + frontend), build (frontend), security audit.
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  # ---------------------------------------------------------------------------
  # 1. Lint – Backend
  # ---------------------------------------------------------------------------
  lint-backend:
    name: Lint · Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run ESLint
        run: npm run lint

  # ---------------------------------------------------------------------------
  # 2. Lint – Frontend
  # ---------------------------------------------------------------------------
  lint-frontend:
    name: Lint · Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run ESLint
        run: npm run lint

  # ---------------------------------------------------------------------------
  # 3. Build – Frontend (Vite)
  # ---------------------------------------------------------------------------
  build-frontend:
    name: Build · Frontend
    runs-on: ubuntu-latest
    needs: [lint-frontend]
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build (Vite)
        env:
          # Inject dummy values so Vite can resolve VITE_ references at build time.
          # Real secrets live in Vercel's project environment variables.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || 'https://api.placeholder.invalid/api' }}
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 4. Security Audit – Backend
  # ---------------------------------------------------------------------------
  audit-backend:
    name: Audit · Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: npm audit (high+critical only)
        run: npm audit --audit-level=high
        continue-on-error: false

  # ---------------------------------------------------------------------------
  # 5. Security Audit – Frontend
  # ---------------------------------------------------------------------------
  audit-frontend:
    name: Audit · Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: npm audit (high+critical only)
        run: npm audit --audit-level=high
        continue-on-error: false

  # ---------------------------------------------------------------------------
  # 6. Final gate – all jobs must pass before merging
  # ---------------------------------------------------------------------------
  ci-gate:
    name: CI Gate ✅
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend, build-frontend, audit-backend, audit-frontend]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint-backend.result }}"   != "success" || \
                "${{ needs.lint-frontend.result }}"  != "success" || \
                "${{ needs.build-frontend.result }}" != "success" || \
                "${{ needs.audit-backend.result }}"  != "success" || \
                "${{ needs.audit-frontend.result }}" != "success" ]]; then
            echo "❌ One or more CI jobs failed."
            exit 1
          fi
          echo "✅ All CI checks passed."
